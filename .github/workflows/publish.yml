name: Publish NuGet

on:
  push:
    tags:
      - "*/v*"
      - "release/v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#*/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$TAG" == release/* ]]; then
            echo "mode=all" >> $GITHUB_OUTPUT
          else
            PACKAGE="${TAG%/v*}"
            echo "mode=single" >> $GITHUB_OUTPUT
            echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack single
        if: steps.tag.outputs.mode == 'single'
        run: dotnet pack src/${{ steps.tag.outputs.package }}/${{ steps.tag.outputs.package }}.csproj --no-build --configuration Release -p:PackageVersion=${{ steps.tag.outputs.version }} --output ./nupkg

      - name: Pack all
        if: steps.tag.outputs.mode == 'all'
        run: |
          VERSION=${{ steps.tag.outputs.version }}
          for proj in Fudie.Domain Fudie.DependencyInjection Fudie.Validation Fudie.Infrastructure Fudie.Generator Fudie.Http Fudie.OpenApi Fudie.PubSub Fudie.Security Fudie.Security.Jwt Fudie.Security.Extensions Fudie.Security.Http Fudie; do
            echo "Packing $proj $VERSION"
            dotnet pack src/$proj/$proj.csproj --no-build --configuration Release -p:PackageVersion=$VERSION --output ./nupkg
          done

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
